<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PlagX</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sky-blue: #3b82f6; --cyan: #06b6d4; --cyan-light: #22d3ee;
            --glass-bg: rgba(255,255,255,0.08); --glass-border: rgba(255,255,255,0.15);
            --text-primary: #f8fafc; --text-secondary: #94a3b8;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #06b6d4);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #164e63 100%);
            min-height: 100vh; color: var(--text-primary);
            display: flex; align-items: center; justify-content: center;
        }
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); animation: float 20s infinite ease-in-out; }
        .orb-1 { width: 500px; height: 500px; background: linear-gradient(45deg, #3b82f6, #06b6d4); top: -150px; left: -100px; opacity: 0.4; }
        .orb-2 { width: 400px; height: 400px; background: linear-gradient(45deg, #8b5cf6, #3b82f6); bottom: -100px; right: -50px; opacity: 0.3; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -30px) scale(1.1); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .login-container {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s ease-out;
        }
        .logo-section { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; justify-content: center; }
        .logo-icon { width: 56px; height: 56px; background: var(--accent-gradient); border-radius: 16px; display: flex; justify-content: center; align-items: center; color: white; font-weight: 800; font-size: 24px; }
        .brand-name { font-size: 32px; font-weight: 800; background: linear-gradient(to right, #fff, #67e8f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-title { text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .form-subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-weight: 600; color: white; margin-bottom: 10px; font-size: 15px; }
        .form-input { width: 100%; padding: 14px 18px; border: 2px solid var(--glass-border); border-radius: 12px; font-size: 15px; background: rgba(15, 23, 42, 0.6); color: white; transition: all 0.3s; font-family: 'Outfit', sans-serif; }
        .form-input::placeholder { color: var(--text-secondary); opacity: 0.7; }
        .form-input:focus { outline: none; border-color: var(--sky-blue); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); }
        .btn-submit { background: var(--accent-gradient); color: white; padding: 16px; border-radius: 14px; font-weight: 600; font-size: 16px; border: none; cursor: pointer; transition: all 0.3s; width: 100%; font-family: 'Outfit', sans-serif; box-shadow: 0 8px 30px rgba(59, 130, 246, 0.3); margin-top: 10px; }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(59, 130, 246, 0.4); }
        .form-footer { text-align: center; margin-top: 24px; color: var(--text-secondary); font-size: 15px; }
        .form-footer a { color: var(--cyan-light); text-decoration: none; font-weight: 500; }
        .form-footer a:hover { text-decoration: underline; }
        .flash-messages { margin-bottom: 20px; }
        .flash { padding: 14px 18px; border-radius: 12px; font-weight: 500; margin-bottom: 12px; }
        .flash.error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
        .flash.success { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }
        .flash.info { background: rgba(59, 130, 246, 0.15); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body>
    <div class="animated-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    <div class="login-container">
        <div class="logo-section">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="PlagX Logo" class="logo-icon">
            <span class="brand-name">PlagX</span>
        </div>
        <h1 class="form-title">Create Account</h1>
        <p class="form-subtitle">Sign up to start using PlagX</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="{{ url_for('signup') }}">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Email (optional)</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label class="form-label" for="role">I am a</label>
                <select id="role" name="role" class="form-input" required>
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn-submit">Sign Up</button>
        </form>
        <div class="form-footer">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </div>
        <div style="text-align: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--glass-border);">
            <p style="color: var(--text-secondary); font-size: 12px;">Developed by: DIVYANSH RAJAT</p>
        </div>
    </div>
</body>
</html>
