<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - PlagX</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --sky-blue: #3b82f6; --cyan: #06b6d4; --cyan-light: #22d3ee;
            --glass-bg: rgba(255,255,255,0.08); --glass-border: rgba(255,255,255,0.15);
            --text-primary: #f8fafc; --text-secondary: #94a3b8;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #06b6d4);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #164e63 100%);
            min-height: 100vh; color: var(--text-primary);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); animation: float 20s infinite ease-in-out; }
        .orb-1 { width: 500px; height: 500px; background: linear-gradient(45deg, #3b82f6, #06b6d4); top: -150px; left: -100px; opacity: 0.4; }
        .orb-2 { width: 400px; height: 400px; background: linear-gradient(45deg, #8b5cf6, #3b82f6); bottom: -100px; right: -50px; opacity: 0.3; }
        @keyframes float { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(30px, -30px) scale(1.1); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .container { width: 100%; max-width: 440px; animation: fadeInUp 0.6s ease-out; }
        .card {
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 48px 40px; box-shadow: 0 25px 80px rgba(0,0,0,0.4);
        }
        .header { text-align: center; margin-bottom: 36px; }
        .logo-icon { width: 64px; height: 64px; background: var(--accent-gradient); border-radius: 18px; display: flex; justify-content: center; align-items: center; color: white; font-weight: 800; font-size: 26px; margin: 0 auto 20px; box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3); }
        .brand-name { font-size: 32px; font-weight: 800; background: linear-gradient(to right, #fff, #67e8f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .subtitle { color: var(--text-secondary); font-size: 16px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: white; margin-bottom: 10px; font-size: 15px; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 16px 20px; border: 2px solid var(--glass-border); border-radius: 14px;
            font-size: 16px; background: rgba(15, 23, 42, 0.6); color: white; transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
        }
        input:focus { outline: none; border-color: var(--sky-blue); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); }
        input::placeholder { color: var(--text-secondary); }
        .btn-submit {
            background: var(--accent-gradient); color: white; padding: 18px 40px; border-radius: 14px;
            font-weight: 600; font-size: 17px; border: none; cursor: pointer; transition: all 0.3s;
            width: 100%; font-family: 'Outfit', sans-serif; box-shadow: 0 8px 30px rgba(59, 130, 246, 0.3); margin-top: 10px;
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(59, 130, 246, 0.4); }
        .alerts { list-style: none; padding: 0; margin-bottom: 24px; }
        .alerts li { padding: 14px 18px; border-radius: 12px; font-weight: 500; }
        .alerts .error { color: #fca5a5; background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); }
        .alerts .info { color: #7dd3fc; background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); }
        .back-link { text-align: center; margin-top: 24px; }
        .back-link a { color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: all 0.3s; }
        .back-link a:hover { color: white; }
    </style>
</head>
<body>
    <div class="animated-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo-icon">🔑</div>
                <div class="brand-name">PlagX</div>
                <p class="subtitle">Reset your password</p>
            </div>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <ul class="alerts">
                        {% for category, message in messages %}
                            <li class="{{ category }}">{{ message }}</li>
                        {% endfor %}
                    </ul>
                {% endif %}
            {% endwith %}
            <form method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>
                <button type="submit" class="btn-submit">Send Reset Link</button>
            </form>
            <div class="back-link">
                <a href="{{ url_for('login') }}">← Back to Sign In</a>
            </div>
            <div style="text-align: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--glass-border);">
                <p style="color: var(--text-secondary); font-size: 12px;">Developed by: DIVYANSH RAJAT</p>
            </div>
        </div>
    </div>
</body>
</html>
