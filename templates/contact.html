<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - PlagX</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sky-blue: #3b82f6;
            --cyan: #06b6d4;
            --cyan-light: #22d3ee;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #06b6d4);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #164e63 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(45deg, #3b82f6, #06b6d4);
            top: -150px;
            left: -100px;
            opacity: 0.4;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(45deg, #8b5cf6, #3b82f6);
            bottom: -100px;
            right: -50px;
            opacity: 0.3;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 800;
            font-size: 20px;
        }

        .brand-name {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #67e8f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--glass-bg);
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 24px;
        }

        .contact-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 48px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            animation: fadeInUp 0.6s ease-out;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .contact-icon {
            width: 72px;
            height: 72px;
            background: var(--accent-gradient);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            margin: 0 auto 20px;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
        }

        .contact-title {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }

        .contact-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 36px;
        }

        .info-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .info-item:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-4px);
        }

        .info-icon {
            font-size: 28px;
            margin-bottom: 12px;
        }

        .info-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-weight: 600;
            color: var(--cyan-light);
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-link a:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="animated-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    
    <header class="header">
        <div class="logo-section">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="PlagX Logo" class="logo-icon">
            <span class="brand-name">PlagX</span>
        </div>
        <nav>
            <a href="{{ url_for('index') }}" class="nav-link">Home</a>
        </nav>
    </header>
    
    <div class="container">
        <div class="contact-card">
            <div class="contact-header">
                <div class="contact-icon">✉</div>
                <h1 class="contact-title">Contact Us</h1>
                <p class="contact-subtitle">Get in touch with the PlagX team</p>
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-icon">📧</div>
                    <div class="info-label">Email</div>
                    <div class="info-value">support@plagx.ai</div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon">🏢</div>
                    <div class="info-label">Organization</div>
                    <div class="info-value">PlagX Research Labs</div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon">🌐</div>
                    <div class="info-label">Website</div>
                    <div class="info-value">www.plagx.ai</div>
                </div>
            </div>
            
            <div class="back-link">
                <a href="{{ url_for('index') }}">← Back to Home</a>
            </div>
            
            <div style="text-align: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--glass-border);">
                <p style="color: var(--text-secondary); font-size: 12px;">Developed by: DIVYANSH RAJAT</p>
            </div>
        </div>
    </div>
</body>
</html>
